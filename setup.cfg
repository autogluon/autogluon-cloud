[mypy]
warn_unused_configs = True
show_error_context = True
pretty = True
check_untyped_defs = True

[tool:pytest]
testpaths = tests
addopts = --strict-markers
xfail_strict = True

[coverage:run]
source = autogluon.cloud
branch = True

[coverage:report]
show_missing = True
skip_covered = True
fail_under = 80

[coverage:paths]
source =
    src/autogluon/cloud
    */site-packages/autogluon/cloud
